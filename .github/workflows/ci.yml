name: CI

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Swift Version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install plugin dependencies
        run: |
          cd obsidian-plugin
          npm ci

      - name: Plugin typecheck
        run: |
          cd obsidian-plugin
          npm run typecheck

      - name: Plugin build
        run: |
          cd obsidian-plugin
          npm run build
